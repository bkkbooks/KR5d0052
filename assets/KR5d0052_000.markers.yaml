  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書子部十四提要𤣥真子道家𩔖附天隱子道家𩔖臣等謹案𤣥真子一卷唐張志和撰志和字子同婺州人初名龜齡肅宗時以明經擢第待詔翰林坐事貶南浦尉後遇赦還放浪江湖以終自號曰烟波釣徒又號曰𤣥真子事蹟具新唐書𨼆傳沈汾續仙傳載其行事甚怪大抵好事者附㑹之實則恬退自全之士而已其書據書録解題稱本十二卷陳振孫時存三卷已非完帙此本併僅存三篇一曰碧虚二曰鸑鷟三曰濤之靈併為一卷與振孫所言又異或當時之本以一篇為一卷歟其言略似抱朴子外篇但文采不及其藻麗耳天𨼆子亦唐人撰不知其姓名前有司馬承禎序則天朝時人晁公武陳振孫皆疑為承禎所托名然承禎自有坐忘論已自著名又何必託名為此書也書凡八篇一曰神仙二曰易簡三曰漸門四曰齋戒五曰安處六曰存想七曰坐忘八曰神解讀書志稱一本有三宫法附於後此本無之殆傳寫佚脱矣書不過數紙不能自成卷帙今以與𤣥真子同時即附之𤣥真子後俾從其𩔖焉无能子道家𩔖臣等謹案无能子三卷不著撰人名字序稱光啟三年天子在褒則唐僖宗時人也宋崇文總目録屬道家晁公武讀書志云書三十篇明老莊自然之㫖今按篇目實三十四篇與序所言篇數合而卷上注闕第六篇卷中注闕第五篇卷下注闕第七第九第十第十二第十三第十四等六篇是其全書具在又不止於三十四篇豈當時有録無書欲為之而未成姑虚列其目耶唐藝文志以為光啟間𨼆民考序中有不述姓名遊宦語則非𨼆民也其書多竊莊列之㫖又雜以釋氏之説詞㫖頗淺第以唐代遺書在今已少姑以舊本録之仍列於道家云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀𤣥眞子原序𤣥眞子書唐張志和所作也志和字子同婺州人父游朝通莊列書為象罔白馬諸篇以佐其說志和始名龜齡年十六擢明經以策干肅宗特見賞重命待詔翰林因賜名後坐事貶南浦尉㑹赦還以親亡不復仕居江湖自稱烟波釣徒著是書凢三卷其言汪洋恣肆逼似莊列亦竒士也李德裕嘗稱其隱而有名顯而無事不窮不逹嚴光之比云}
