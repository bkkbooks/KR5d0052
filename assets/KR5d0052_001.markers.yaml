  - {type: variant, offset: 2563, length: 3, content: 篇卷上, YP-C: 子之遠乎鏡入吾質之內子之自無恒豈吾之獨無常歟雖然子之同抑吾之可通吾怪吾之尤者雖吾亦不知之何哉吾遇陽燧之抱倒乎子之面吾遭羅㬋之蝕曲乎子之葉吾將問諸造化窮理盡性而不知者命也夫影笑之曰君弟收光吾將滅影有之與無由君之與吾何背何正妄推乎造化之命哉默之來也默曰一寂能一之默曰二寂能二之默之一也無寂之一也有默之二也無有寂之二也有無一之一也不離乎二二之二也不離乎一然則知寂之不一明默之不二者斯謂之眞一矣夫眞一者無一無二無寂無默無是四者又無其無斯謂之眞無矣夫能游乎眞無之域者然後謁乎眞一之容者焉夫游乎眞無之域謁乎眞一之容者乃見乎諸無矣寂於是謂默曰若夫諸無者人莫能名焉吾强爲之名者曰太無之寰夫太無之寰者人無能謚焉吾强爲之謚者子能聽之乎曰能寂於是乎端容節氣湛然不言久之而兩忘默之悟曰向也吾聞其名矣又見其無也今也吾聞其謚矣未見其無也斯之謂之太無之謚耶寂之覺曰適吾與子爲微談而子果聞諸子可謂明微矣自默之還也而寂爲之絶談}
