  - {type: variant, offset: 2559, length: 0, content: '', CK-KZ-jye: 鸑鷟氏自東方來狻麑氏自西域至遇于中華之野相與競虛談以聲戰勝負於是鸑鷟氏嚶若而鳴曰吾聞吁者嘻者呵者噓者喟㕟颬呬喘乎氣噬者啜者啐者歠者辛酸甜淡吮乎味睨者辯者眄者睢盰矎𥅯察乎瞳戛者控者乾者扌走牙者鏗鍠䥢鼕讙乎聰斯極已於是狻麑氏䞴然而唬曰吾聞日者月者彗者孛者昭晰粲朗斡乎天峯者岑者岡者巖者嵯峨巉崒疊乎山濤者波者湓者渦者澎訇澶漫蕩乎水僪者鬼安者魑者魅者僁𡨧䰧𠂢鬼歘乎鬼斯極已意曰酬酢相窮以言泉飛不斷目以爲極然鸑鷟氏摩距厲吻以觜戲聞狻麑氏奮毛掉尾以喉鳴震中華子歎之曰近謂諸身則鸑鷟之說遠謂諸物則俊麑之說斯二君者背彼默場勞於聲戰雖扇眸若電鼓舌如霆適足驚鷙於窮谷安能響道於滄溟哉太寥問乎無邊曰若夫造化之間萬象不一求小大有無之至者可得而言乎無邊曰以吾觀之至小者大而至大者小至無者有而至有者無若知之乎太寥曰以吾聞之至小不可以大至大不可以小至無不可以有至有不可以無子之所謂者何也無邊曰吾請告若至小至大者莫甚乎空至無至有者莫過乎道其所然者何也包天地至有外者唯乎空非空之至大耶判微塵至於內者成乎空非空之至小耶廵六合求之而不得者非道之至無邪出造化離之而不免者非道之至有邪故曰至小者大至大者小至無者有至有者無不亦然乎造化之初九大相競風之飄䬑然曰䬌䬌乎之飍飍乎而𩘪𩘪乎之飂飂乎而扇鴻濛而么飉㕭嘐鼓䜰䜮而悲咤䬂䬘蹶石拔木蹙浪奔濤其孰能大乎吾之大乎而雲之氣騰然曰翕乎忽乎之滅没乎者漨浡涸煴之蓊鬱乎者蒙乎昧乎之昏晦乎者靉靆黭黮之䨢䨴乎者翳海吞山遏日漫天其孰能大乎吾之大乎者雷之聲塡然曰諜轟轟乎轢轢忽犖犖乎虩虩磤輪奔乎轂乎些欻電烻烈缺砉霆驚劈厯乎些若獨不聞乎洪濤震鼓猛獸唬怒彼碌碌者莫吾之與巨其孰能大乎吾之大乎些海之濤奔然曰浩乎汗乎之澶漫乎且澎乎湃乎之滂沛乎且何鯤鵬頒鰓臭翼之聲邪乎且翻鼇盪鯨崩壺倒瀛其孰能大乎吾之大乎且火之熛烈然曰烘乎炵乎之煥爛乎焉翕乎煜乎之煽炫乎焉㽎㶼灼爍烜爀燏𤐰涸澤燋山熾日熏天其孰能大乎吾之大乎焉日之燿照然曰煌煌乎陽陽乎歟晶晶乎之熒熒乎歟杲杲曈曈炎炎赫赫光天照地流金鑠石其孰能大乎吾之大乎歟地之震殷然曰坤乎崙乎之坱圠磅礴之乎之崔乎嵬乎之坳墝磽䃗之乎之浸海流河而有常奔山走陵而無疆其孰能大乎吾之大乎之天之鳴𥥈然曰乾乎圓乎之慤乎只穹乎崇乎廓乎只昊恢恢之顛顛旻蒼蒼之玄玄包水旋風蓋地寰空其孰能大乎吾之大乎只空之寥𣪯然曰豁乎沈乎之矌宕乎哉虛乎無乎之漭浪乎哉濛同茫唐青冥蒼茫廓兮而㝩㝗包天裹地誕陰育陽其孰能大乎吾之大乎哉既而九大各自競能風之擊曰孰有大乎吾曹之大矣空應之曰吾聞太上之言道名之大可詣而問焉於是雲停其氣風息其飄日罷其燿海弭其濤地復其震火滅其熛天靜其鳴空喪其寥於是乎俾雷之迸入道之境聲者讓響形者讓影不有不無不動不靜九大觀之各慙而還遂相讓爲無爲之色相與成無爲之域以終乎塵劫之極而已焉乎欹道之形也虛道之影也無道之聲也初道之響也如昔之爲狀乎廓然其虛者空也莫然其無者滅也永然其初者遠也靜然其如者定也字之曰遺遐明默慤博玄圓者何也遺以盡其失遐以邈其遙明以照其光默以湛其寂慤以堅其固博以大其廣玄以神其妙圓以規其周故曰德者得也得乎不得不得乎得斯之謂乎得其德者何也文宣德之而無我老氏德之而未孩南華德之獨與天地精神往來而不敖睨於萬物噫沖虛德之泠然御風顏囘德之同於大通然則大寥德之無終始已矣夫延吾思之不能竟也將何以窮有物之既乎燿夜者燭腹也橐體者篋軀也戴芥者負垢也苗蜩者根蟬也睛星者眩華也燭腹之蟲循乎墻篋軀之蟲出乎隙負垢之蟲游乎業根蟬之蟲植乎土篋軀哂乎燭腹曰子之自謂養生之固者也燭乎腹燿乎夜見乎險阻審乎取捨然而世人相有炫明之患怪乎物亡乎身未若吾之晦迹之逍遙也負垢哂乎篋軀曰子之自謂養生之固者也橐乎體篋乎軀進則外乎首而行恐則內乎元而靜然而出入有首鼠之患怪乎物亡乎身未若吾之蓋形之逍遙也根蟬哂乎負垢曰子之自謂養生之固者也蓁然芥孽然垢徐然步物之不疑子之動也糞然形物之不疑子之生也然而慮風火有驚恐之患未若吾之瘞體之逍遙也之數蟲者各以能之相哂也於是眩華聞之哂乎根蟬曰子之自謂養生之固者也藏乎口匿乎目虗乎心實乎腹根乎足潤水土於外而不行苗乎脊受風日於外而屢長無羈麗妥䧿之嫌者矣然而累乎質礙乎有苟遇掘鑿之患怪乎物亡乎身未若吾之瞥然之逍遙也根蟬曰吾禀乎造化之奇妙乎古今之知藏口匿目虛心實腹之數蟲者其於衛生莫吾如也向吾聞子之聲昧子之形狀子之有自何而生眩華曰吾生乎目之眩長乎視之亂其徐也聯若星之貫其疾也紛若華之散取之而不得捨之而不克謂無而有謂有而無其來也儵見乎造化其去也寂歸乎太虛能游乎不物之域者方覩乎吾之逍遙之墟域同乎于圓也方也于方也圓也故曰至圓無圓而能方至方無方而能圓孰能圓乎方者曰太圓孰能方乎圓者曰太方故太方有言曰昔吾方子之圓而子弗知吾之方太圓曰曩吾圓爾之方而爾不知吾之圓若然者何也其有以哉是故規乎虛者虛之不知其圓也矩乎空者空之不知其方也然則游心乎太寂之鄉命規矩無措其巧者其唯太圓之與太方乎倭之人談曰東海有鳥其名爲鵜鵜之巨鵬之亞也泛乎滄溟吞乎長鯨厭而翶翔乎碧空之畔防風㚠者弋伯者也爲大弓萬物鉤望巨鵜之飛於是乎彀以射焉一發而中鵜之咤怒聲越雷霆俄而驟血成河落毛翳日翻墜之勢韻乎空濛之間墮於曠漭之野𣪯然震乎大地太虛爲之響造化爲之兇防風㚠環趨觀之旬日而畢然後陟巨鵜之上旁觀四海嵐蔽乎大地於是率天下之庖徒雲梯而解之四方之烹者蒸氣成雲山木爲之竭脯之費七年而中華不腊肪之用九年而異域不膏帆其羽以爲舟者散乎大海命之曰鵜毛之舶防風㚠神其弓之力也每齋沐而祭焉天下之博聞志怪者莫不命駕而觀之弧矢之盛造化以來未之有者於是乎在也濤之靈曰江胥漢之神曰河姑會于眞原之野江之胥問乎河之姑曰吾以子爲水也縣而不散夜而能煥異乎川者何也河之姑曰代謂吾之神以至於此吾亦何知焉若不聞乎泛天舩寫天江俾牽牛織女之相望此吾之所能也敢問乎若吾以若爲流也卻而罷進行而有信似乎識者何也江之胥曰代謂吾之靈以至於此吾亦何知焉子不聞乎疾雷之奔羣鷺之翔素車白馬兮三軍之騰裝此吾之所能也於是胥姑欣然相視而笑自謂靈神之至傲若無他道之微曰至玄在乎眞原之野聞而謂之曰若爲胥姑哉今吾語若見天地之創遂觀濤漢之有且若之徒假名乎巫咸之口投首乎春秋之代不亦近歟夫迷者自釋濤漢之疑假若胥姑之有奈何受迷徒之咨而不覺竊造化之巧以爲功不慙迷者之鬼笑若於黃泉之間歟胥姑悚然謝而問之曰吾以君爲友也寂而不動虛而能應訐吾之妄俾吾之慙君亦有夫心哉吾聞道之微先天地生在眞原之野號曰至玄得非君子乎孰爲君之名哉吾請辯吾靈神之所因原夫濤漢之所以可得聞乎至玄謂曰吾將吿若欲知漢之說者觀乎碧之理有潔白之文察乎螢之腹有昏曉之變體之異也豈有姑之神邪雖天漢之大非川可知矣若欲知濤之說者觀乎脉之血有往來之勢察乎槐之葉有開合之期氣之應也豈有胥之靈邪雖海濤之盛非識可見矣若欲知吾之說者空之無形而不動谷之無情而能應虛之至也豈有微之邪雖吾道之妙無心可知矣吾且告若崑崙之墟有智蟲焉贅聞而疣見託吾之無憑若之有强目河姑之神假意江胥之靈妄首至玄之微僞之興也於是乎起吾觀之太寰之內似神而無者六海波泝江而爲濤天文皎夜而爲漢炎光閃雲而爲電雨色映日而爲虹陽氣轉空而爲雷心智滅境而爲道其所然者皆有由也非若之靈無吾之玄然吾之無也不無在若之有乎何有於是胥姑駢舞而謝曰實如所論有慙故友願陪無心之游聊以卒歲生爲智蟲之所誣死則葬眞原之野安能復區區託靈濤漢使迷者之鬼笑吾儕於黃泉之間哉是夏也通眞之伯會起觀之君坐忘之后于睽修玄好也中談而二侯競道之有無連關解並竟日不决觀之君曰吾起於觀亭之間知道不無而見有忘之后曰吾坐於忘臺之上見道不有而知無通眞之伯謂之曰至道非有有無之殊君不見三光之見天邪在高下而不同日月之體有大小諸星之位有廣狹若以遠近論小大稽夫日也失之於炎涼若以炎涼而語遠近稽夫日也失之於小大乃知無遠近之異旁視仰觀人目自爾夫以百尺之竿戴乎盤卧之立之遠近適等而小大不同信目之有夷險矣在乎東西不熾者諒袤照而不正自此地之陰氣得昇耳然則至道之見乎心也亦猶是哉在忘觀而不一或以爲有或以爲無以道爲有使觀君處忘臺而見無以道爲無使忘后游觀亭而知有斯乃忘觀之心自爾有無之體不殊由意之懷執滯者也然則競三光之遠近者不曉乎夷險之微競至道之有無者未通乎執滯之礙矣於是二君聞之餂舌而退達玄夫子曰睽之會一三光之遠近合至道之有無剖古今不明之癖削談論不决之贅使觀君節並而忘后弭關者眞伯之力也吳生者善圖鬼之術粉壁墨筆風馳電走或先其足或見其手旣會其身果應其口若合自然似見造化負以國名行年六十天下之圖工迹其妙而不能盡}
