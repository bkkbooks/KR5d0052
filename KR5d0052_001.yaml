front:
  text: 玄真子外篇卷上中下同卷甚八
  hash: sha256:3d0869feb3d70f640f9ff5ad1537b821def46f52066c8db93eaa2d80a98d7ce2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0052_HFL_001-001a, image: hfl/0672/0672-120.png}
body:
  text: 唐玄真子張志和撰碧虛碧虛冥茫飄輪斡乎乾湫盤浮乎坤紅明環於天衢升井為炎降斗為寒由是四時旋而萬物遷斯造化之亞矣然非造化之元哉無涯者辨伯也涯之言曰黃郊之帝曰只卑紫微之帝曰神尊碧虛之帝曰靈荒只卑王於地山河草木屬焉神尊王於天日月星漢屬焉靈荒王於空風雷雲雨屬焉碧虛和平二帝有方春之會俄而只卑上騰神尊下降遇于靈荒之野靈荒之帝虛位郊迎傾國所有積肉成霞散酒成雨電走雷奔風歌雲舞纍月為中道主上下無怨二帝欣然愧靈荒之厚德令碧虛之不安爭讓國以延靈荒之帝神尊曰朕有天只卑曰朕有地靈荒怪天地之名問之曰朕之仰觀不異碧虛朕之俯察不異碧虛碧虛之中其又奚物帝言天地厥狀若何只卑曰朕之地體大質厚資生元元中高外垂其勢坤層然如壇輳物尊圍八極海環九山骨巖石毛草木肉土而脉泉汗露而氣煙江河川瀆亂奔流人蟲鳥獸紛往還轉其行乾穹然如帳幬物尊五星交列宿粲邊層輪日月中文帶河漠絶氛祲雲霞列仙天宮殿願帝之上而居焉靈荒未之信曰天如帳胡縣乎其上地如壇厥下乎何安神尊曰天之帳非上縣飄輪下載常左旋三光隨之以西遷只卑曰地之壇有湫盤凝浮其上所以安靈荒曰飄輪斡靈生湫盤奚物盛願聞之只卑曰飄輪遍乎下湫盤所以停帝何疑靈荒曰噫天地之形造化信然實如所論固當息焉朕之空茫唐濛同無不通無內無外無西無東曠閭漭蕩蒼茫青冥含日月之光震雷霆之聲挂虹霓之色飛龍鸞之形朕坐而游之卧而泅之泛然飄飄皆可停豁乎包乎毋廓乎堅乎壽非春夏之能生非歲年之能朽先天地不見其初後天地不知其久若然者安能棄朕之長無寄君之暫有哉於是二帝謝靈荒之言退還故府只卑降黃郊神尊升紫微數月不泰然天地為之閉紅霞子問乎碧虛子曰夫造化之端自然之元其體若何霄願游夫子之域而觀之豈得聞邪於是碧虛子沈然有間豁然情容而曉顔詠乎太寥之上為空洞之歌謂之曰無自而然自然之無無造而化造化之端廓然慤然其形團闔爾之視絶爾之思可以觀紅霞子曰若霄者倏遨而忽游請駕乎言霄願乘之以逍遙不暇辭夫子而觀焉於是碧虛子導之曰無自而然是謂玄然無造而化是謂真化之玄也之真也無玄而玄是謂真玄無真而真是謂玄真馳言曰無然乎其然一乎然然後觀乎自然無化乎其化一乎化然後觀乎造化無玄乎其玄一乎玄然後觀乎真玄無真乎其真一平真然後觀玄真逸言曰真真乎玄玄玄乎真玄乎無真乎真真真乎無玄平玄玄然後登太寥之天夫無有也者有無之始也有無也者無有之初也無有作有無立而造化行乎其中矣夫造化之興也空以遍之風以行之水以聚之識以感之氣以通之而萬物備乎其中矣空遍而體存風行而用作水聚而有見識感而念生氣通而意立體存故可以厚本用作故可以明漸有見故可以觀變念生故可以知化意立故可以詳理是知本可厚者空之體也漸可明者風之用也變可觀者水之有也化可知者識之念也理可詳者氣之意也是故風水競變物其物而不同識氣多端意其意而不一斡乎乾而能常浮乎坤而能長運之而無窮生之而無方化之而無邊因之而無疆原其原者夫何謂歟造而化之存平初太而極之存乎無自而然之存乎虛無而住之存乎妙觀其所存而造化之元可見矣紅霞子明乎造化之域患平屢空之色於是披紅陽之光餐碧寥之氣以實其容絶慶弔之禮寡親朋之問獨與太虛游往來高會僕風應門燭月繼夜而寂談不輟味俗享貴者聞之造焉覩其空巷荒廬色不勝憂心為之恥謂之曰我躬不閲遑恤造化紅霞子曰吾為造化知己罔有弗詳而造化獨不吾知致有所乏吾無慙於造化造化有愧於吾吾將往而詬之以慰君之憂浣君之恥於是駕紅陽之駒乘碧寥之輿拂衣東轅經諸無之國遇同空將假道焉同空曰君何為者而届平斯曰吾紅霞子也吾將詬諸造化願假道于君同空問之曰孰為造化奚謂假道紅霞子曰為物之宰主曰造化藉君之國行曰假道同空曰若然者朕之東無化可造朕之國無道可假君其改途紅霞子於是乎拂衣南馳經自然之域遇化元將假道焉化元曰子何為者而届乎斯曰吾紅霞子也吾將詬諸造化願假道于君化元詰之曰夫造化朕之兄弟之國也子弗聞乎假朕之道詬朕之親朕之仇也師徒將攻之紅霞子於是乎拂衣西驅經無住之邦遇因本將假道焉因本曰子何為者而届乎斯曰吾紅霞子也吾將詬諸造化願假道于君因本拒之曰假道之資子弗聞乎子有飛空之乘輿照虛之璧吾將為子啓關紅霞子曰使吾有璧乘之資尚弗詬諸造化無假道于君哉於是乎拂衣而北趨經太極之野遇生首將假道焉生首曰子何為者而届乎斯曰吾紅霞子也吾將詬諸造化願假道于君生首訶之曰子何知之晚也夫造化之敻可知而不可鄰可聞而不可親雖欲假子之道其何以至子將詬之無乃不可乎於是紅霞子聞生首之訶兀焉喪有徘徊躊躇還轡旋輿經玄原之郊迷失途於牧道童子神與易浴乎玄川而遨於是問津焉二童曰夫子奚氏也跋涉虛無蒙犯煙霄車馬有游空之倦何之而問乎津紅霞子曰吾紅霞子也吾嘗知造化而造化弗吾如使吾之資身之用為味俗之恥吾將詬諸造化吾適東轅西驅南馳北趨而假道於四方東至于諸無南至于自然西至于無住北至于太極四之皆不遇諸無有同空之問無住有因本之拒太極有生首之訶自然有化元之詰吾念日暮途遠旋吾之輿歸乎寰中於斯迷津幸哉而遇子敢欲問焉然子為誰也偉哉而文於言哉二童曰吾謂神之與易也吾與造化牧道于玄郊吾適為六塞之戲俱亡其道吾懼造化之責躊躇而遷延因浴乎玄原且吾之有道憂尚敢見造化奈何夫子以俗恥而干吾君賴夫子有諸侯之詰無然一忤造化之念兹玄原之上豈可復觀吾二童之泅游哉夫子辭寰中而來未覩造化茫然迷津而問途欲迷舊居將何面目以見寰中之父兄乎胡弗解裳浴焉同涸隨波泛濤聊以游遨俟吾白圖之成將近夫子而謁諸造化不亦爾豁乎紅霞子於是赩然浮光沈影泝瀨沿波與二童乘玄濤之騰淡泛六合之外倏忽至造化之境自然奉常然衣太極進無極食煥然盈造化之域紅霞子與二童披而餐之榮光洞六合之內然後謁乎化真顧而俯於寰中慙代俗之榮恥皆妄觀乎化真唯懼造化之知其將詬也於是聽造化問二童道之所在二童曰無亡無不亡道不離乎皇之鄉造化欣然曰無有其有者無亡其亡無不有其不有者無不亡其不亡放乎玄原之郊而無邊童子得牧道之方矣於是紅霞子盈自然衣充太極食樂造化言荷造化力揖造化與二童眷然而退將還舊居是行也與太虛遇于同空太虛曰自子之觀造化也索焉離居蕭然荒廬念子寰中無恙紅霞子曰吾適也面造化容意造化心耳造化言吾知至道之無有也吾豈見寰中之有無哉化之元也原乎有者觀其無原乎無者觀其有奚以狀其然邪容之為言也冥其靈乎也精茫其唐乎也荒故曰冥靈精之難明茫唐荒之難詳殊萬形之無窮異萬心之無方是以昔之登太寥觀化元者知其運乎工而未央作太寥之歌曰化元靈哉碧虛清哉紅霞明哉冥哉茫哉惟化之工無疆哉非夫同萬形之殊殊萬形之同一萬心之異異萬心之一馳不想而届乎冥茫之端倪者則何以環游太無觀造化之無矣玄真子外篇卷上
