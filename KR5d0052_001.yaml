front:
  text: 玄眞子外篇卷上中下同卷甚八
  hash: sha256:9f90c849e05e2bf53b5ed21a920626c2b151a40e9a49fe767a3850b199fcd13a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0052_HFL_001-001a, image: hfl/0672/0672-120.png}
body:
  text: 唐玄眞子張志和撰碧虚碧虚冥茫飄輪斡乎乾湫盤浮乎坤紅明環於天衢升井爲炎降斗爲寒由是四時旋而萬物遷斯造化之亞矣然非造化之元哉无涯者辯伯也涯之言曰黃郊之帝曰衹卑紫微之帝曰神尊碧虛之帝曰靈荒衹卑王於地山河草木屬焉神尊王於天日月星漢屬焉靈荒王於空風雷雲雨屬焉碧虚和平二帝有方春之會俄而衹卑上騰神尊下降遇于靈荒之野靈荒之帝虚位郊迎傾國所有積肉成霞散酒成雨電走雷奔風歌雲舞累月爲中道主上下无怨二帝欣然愧靈荒之厚德令碧虚之不安爭讓國以延靈荒之帝神尊曰朕有天衹卑曰朕有地靈荒怪天地之名問之曰朕之仰觀不異碧虚朕之俯察不異碧虚碧虚之中其又奚物帝言天地厥狀若何衹卑曰朕之地體大質厚資生元元中高外垂其勢坤層然如壇輳物尊圍八極海環九山骨巖石毛草木肉土而脉泉汗露而氣煙江河川瀆亂奔流人蟲鳥獸紛往還轉其行乾穹然如帳幬物尊五星交列宿粲邊層輪日月中文帶河漠絶雰祲雲霞列仙天宮殿願帝之上而居焉靈荒未之信曰天如帳胡縣乎其上地如壇厥下乎何安神尊曰天之帳非上縣飄輪下載常左旋三光隨之以西遷衹卑曰地之壇有湫盤凝浮其上所以安靈荒曰飄輪斡靈生湫盤奚物盛願聞之衹卑曰飄輪徧乎下湫盤所以停帝何疑靈荒曰噫天地之形造化信然實如所論固當息焉朕之空茫唐濛同无不通无内无外无西无東曠閭漭蕩蒼茫青冥含日月之光震雷霆之聲挂虹蜺之色飛龍鸞之形朕坐而游之卧而泅之泛然飄飄皆可停豁乎包乎毋廓乎堅乎壽非春夏之能生非歲年之能朽先天地不見其初後天地不知其乆若然者安能棄朕之長无寄君之暫有哉於是二帝謝靈荒之言退還故府衹卑降黄郊神尊升紫微數月不泰然天地爲之閉紅霞子問乎碧虚子曰夫造化之端自然之元其體若何霄願游夫子之域而觀之豈得聞邪於是碧虚子沈然有間豁然情容而曉顔詠乎太寥之上爲空洞之歌謂之曰无自而然自然之无无造而化造化之端廓然慤然其形團闔爾之視絶爾之思可以觀紅霞子曰若霄者儵遨而忽游請駕乎言霄願乘之以逍遥不暇辭夫子而觀焉於是碧虚子導之曰无自而然是謂玄然无造而化是謂眞化之玄也之眞也无玄而玄是謂眞玄无眞而眞是謂玄眞馳言曰无然乎其然一乎然然後觀乎自然无化乎其化一乎化然後觀乎造化无玄乎其玄一乎玄然後觀乎眞玄无眞乎其眞一平眞然後觀玄眞逸言曰眞眞乎玄玄玄乎眞玄乎无眞乎眞眞眞乎无玄平玄玄然後登太寥之天夫无有也者有无之始也有无也者无有之初也无有作有无立而造化行乎其中矣夫造化之興也空以徧之風以行之水以聚之識以感之氣以通之而萬物備乎其中矣空徧而體存風行而用作水聚而有見識感而念生氣通而意立體存故可以厚本用作故可以明漸有見故可以觀變念生故可以知化意立故可以詳理是知本可厚者空之體也漸可明者風之用也變可觀者水之有也化可知者識之念也理可詳者氣之意也是故風水競變物其物而不同識氣多端意其意而不一斡乎乾而能常浮乎坤而能長運之而无窮生之而无方化之而无邊因之而无疆原其原者夫何謂歟造而化之存平初太而極之存乎无自而然之存乎虚无而住之存乎妙觀其所存而造化之元可見矣紅霞子明乎造化之域患平屢空之色於是披紅陽之光餐碧寥之氣以實其容絶慶弔之禮寡親朋之問獨與太虚游往來高會僕風應門燭月繼夜而寂談不輟味俗享貴者聞之造焉覩其空巷荒廬色不勝憂心爲之恥謂之曰我躬不閱遑恤造化紅霞子曰吾爲造化知己罔有弗詳而造化獨不吾知致有所乏吾无慙於造化造化有愧於吾吾將往而詬之以慰君之憂澣君之恥於是駕紅陽之駒乘碧寥之輿拂衣東轅經諸无之國遇同空將假道焉同空曰君何爲者而届平斯曰吾紅霞子也吾將詬諸造化願假道于君同空問之曰孰爲造化奚謂假道紅霞子曰爲物之宰主曰造化藉君之國行曰假道同空曰若然者朕之東无化可造朕之國无道可假君其改途紅霞子於是乎拂衣南馳經自然之域遇化元將假道焉化元曰子何爲者而届乎斯曰吾紅霞子也吾將詬諸造化願假道于君化元詰之曰夫造化朕之兄弟之國也子弗聞乎假朕之道詬朕之親朕之仇也師徒將攻之紅霞子於是乎拂衣西驅經无住之邦遇因本將假道焉因本曰子何爲者而届乎斯曰吾紅霞子也吾將詬諸造化願假道于君因本拒之曰假道之資子弗聞乎子有飛空之乘輿照虚之璧吾將爲子啓關紅霞子曰使吾有璧乘之資尚弗詬諸造化无假道于君哉於是乎拂衣而北趨經太極之野遇生首將假道焉生首曰子何爲者而届乎斯曰吾紅霞子也吾將詬諸造化願假道于君生首訶之曰子何知之晩也夫造化之夐可知而不可鄰可聞而不可親雖欲假子之道其何以至子將詬之无乃不可乎於是紅霞子聞生首之訶兀焉喪有徘徊躊躇還轡旋輿經玄原之郊迷失途於牧道童子神與易浴乎玄川而遨於是問津焉二童曰夫子奚氏也跋涉虚无蒙犯煙霄車馬有游空之倦何之而問乎津紅霞子曰吾紅霞子也吾嘗知造化而造化弗吾如使吾之資身之用爲味俗之恥吾將詬諸造化吾適東轅西驅南馳北趨而假道於四方東至于諸无南至于自然西至于无住北至于太極四之皆不遇諸无有同空之問无住有因本之拒太極有生首之訶自然有化元之詰吾念日暮途遠旋吾之輿歸乎寰中於斯迷津幸哉而遇子敢欲問焉然子爲誰也偉哉而文於言哉二童曰吾謂神之與易也吾與造化牧道于玄郊吾適爲六塞之戲俱亡其道吾懼造化之責躊躇而遷延因浴乎玄原且吾之有道憂尚敢見造化柰何夫子以俗恥而干吾君賴夫子有諸侯之詰无然一忤造化之念兹玄原之上豈可復觀吾二童之泅游哉夫子辭寰中而來未覩造化茫然迷津而問途欲迷舊居將何面目以見寰中之父兄乎胡弗解裳浴焉同涸隨波泛濤聊以游遨俟吾白圖之成將近夫子而謁諸造化不亦爾豁乎紅霞子於是赩然浮光沈影泝瀨沿波與二童乘玄濤之騰澹泛六合之外儵忽至造化之境自然奉常然衣太極進无極食煥然盈造化之域紅霞子與二童披而餐之榮光洞六合之内然後謁乎化眞顧而俯於寰中慙代俗之榮恥皆妄觀乎化眞唯懼造化之知其將詬也於是聽造化問二童道之所在二童曰无亡无不亡道不離乎皇之鄕造化欣然曰无有其有者无亡其亡无不有其不有者无不亡其不亡放乎玄原之郊而无邊童子得牧道之方矣於是紅霞子盈自然衣充太極食樂造化言荷造化力揖造化與二童眷然而退將還舊居是行也與太虚遇于同空太虚曰自子之觀造化也索焉離居蕭然荒廬念子寰中无恙紅霞子曰吾適也面造化容意造化心耳造化言吾知至道之无有也吾豈見寰中之有无哉化之元也原乎有者觀其无原乎无者觀其有奚以狀其然邪容之爲言也冥其靈乎也精茫其唐乎也荒故曰冥靈精之難明茫唐荒之難詳殊萬形之无窮異萬心之无方是以昔之登太寥觀化元者知其運乎工而未央作太寥之歌曰化元靈哉碧虚清哉紅霞明哉冥哉茫哉惟化之工无疆哉非夫同萬形之殊殊萬形之同一萬心之異異萬心之一馳不想而届乎冥茫之端倪者則何以環游太无觀造化之无矣玄眞子外篇卷上
