front:
  text: 玄真子外篇卷下
  hash: sha256:c97e71fd367b7d41d758bf2b111ae09ce84145c17afa48f88f47e1808c08e5b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0052_HFL_003-001a, image: hfl/0672/0672-151.png}
body:
  text: 唐玄真子張忘和撰濤之靈濤之靈曰江胥漢之神曰河姑會于真原之野江之胥問乎河之姑曰吾以子為水也縣而不散夜而能煥異乎川者何也河之姑曰代謂吾之神以至於此吾亦何知焉若不聞乎泛天船寫天江俾牽牛織女之相望此吾之所能也敢問乎若吾以若為流也却而罷進行而有信似乎識者何也江之胥曰代謂吾之靈以至於此吾亦何知焉子不聞乎疾雷之奔羣鷺之翔素車白馬兮三軍之騰裝此吾之所能也於是胥姑欣然相視而笑自謂靈神之至傲若無他道之微曰至玄在乎真原之野聞而謂之曰若為胥姑哉今吾語若吾見天地之創遂觀濤漢之有且若之徒假名乎巫咸之口投首乎春秋之代不亦近歟夫迷者自釋濤漢之疑假若胥姑之有奈何受迷徒之咨而不覺竊造化之巧以為功不慙迷者之鬼笑若於黃泉之間歟胥姑悚然謝而問之曰吾以君為友也寂而不動虛而能應訐吾之妄俾吾之慙君亦有夫心哉吾聞道之微先天地生在真原之野號曰至玄得非君子乎孰為君之名哉吾請辨吾靈神之所因原夫濤漢之所以可得聞乎至玄謂曰吾將告若欲知漢之説者觀乎碧之理有潔白之文察乎螢之腹有昏曉之變體之異也豈有姑之神邪雖天漢之大非川可知矣若欲知濤之説者觀乎脈之血有往來之勢察乎槐之葉有開合之期氣之應也豈有胥之靈邪雖海濤之盛非識可見矣若欲知吾之説者空之無形而不動谷之無情而能應虛之至也豈有微之邪雖吾道之妙無心可知矣吾且告若崑崙之墟有智蟲焉贅聞而疣見託吾之無憑若之有強目河姑之神假意江胥之靈妄首至玄之微偽之興也於是乎起吾觀之太寰之內似神而無者六海波泝江而為濤天文皎夜而為漢炎光閃雲而為電雨色映日而為虹陽氣轉空而為雷心智滅境而為道其所然者皆有由也非若之靈無吾之玄然吾之無也不無在若之有乎何有於是胥姑駢舞而謝曰實如所論有慙故友願陪無心之遊聊以卒歲生為智蟲之所誣死則葬真原之野安能復區區託靈濤漢使迷者之鬼笑吾儕於黃泉之間哉是夏也通真之伯會起觀之君坐忘之后于睽修玄好也中談而二侯競道之有無連關解並竟日不決觀之君曰吾起於觀亭之間知道不無而見有忘之后曰吾坐於忘臺之上見道不有而知無通真之伯謂之曰至道非有無之殊君不見三光之見天邪在高下而不同日月之體有大小諸星之位有廣狹若以遠近論小大稽夫日也失之於炎涼若以炎涼而語遠近稽夫日也失之於小大乃知無遠近之異旁視仰觀人目自爾夫以百尺之竿戴乎盤卧之立之遠近適等而小大不同信目之有夷險矣在乎東西不熾者諒袤照而不正自此地之隂氣得升耳然則至道之見乎心也亦猶是哉在忘觀而不一或以為有或以為無以道為有使觀君處忘臺而見無以道為無使忘后遊觀亭而知有斯乃忘觀之心自爾有無之體不殊由意之懷執滯者也然則競三光之遠近者不曉乎夷險之微競至道之有無者未通乎執滯之礙矣於是二君聞之銘舌而退達玄夫子曰睽之會一三光之遠近合至道之有無剖古今不明之癖削談論不決之贅使觀君節並而忘后弭關者真伯之力也昊生者善圖鬼之術粉壁墨筆風馳電走或先其足或見其手既會其身果應其口若合自然似見造化負以國名行年六十天下之圖工迹其妙而不能盡玄真子聞而造焉曰敢問圖鬼之方有術何其道之不竭也昊生喜而言曰子非圖工之徒歟奚其問之深也於是筆酣之間揖玄真子巵而酒之酒酣之間揖玄真子甌而茶之茶酣之間屛諸弟子揖玄真子宿而話之告以圖鬼之方曰吾何術哉吾有道耳吾嘗茶酣之間中夜不寢澄神湛慮喪萬物之有忘一念之懷久之寂然豁然倏然恢然匪素匪畫詭怪魅魁千巧萬拙一生一滅來不可閼貌不可竭吾以其道之妙其方之要每以圖鬼為事未嘗告術於人是以行年六十負於國名天下以吾為圖鬼之祖自吾作古圖工如林願吾之覩聲吾響而不終形吾影而不窮響吾巧而竭力影吾道而莫測感子有造化之問吾不能無造化之對以吾不傳於人請子告於代玄真子謝之曰沿境者易泝像者難幸聞圖鬼之道吾見造化之端吾固不代之告君無謂吾之傳荷水為珠其圓也非規而不可方者離乎著也燼火為輪其常也非環而不可斷者疾乎連也背日貫乎水成虹霓之狀而不可直者齊乎影也汲江釀乎酒應波濤之湧而不可停者均乎氣也片雨滴海合滄溟而不可殊者得其一也寂心歸空同太虛而不可分者會其天也日月有合璧之元死生有循環之端定合璧之元者知薄蝕之交有時達循環之端者知死生之會有期是故月之掩日而光昏月度而日耀日之對月而明奪違對而月朗是故死之換生而魂化死過而生來生之忘死而識空失忘而死見然則月之明由日之照者也死之見由生之知者也非照而月之不明矣非知而死之不見矣且薄蝕之交不能傷日月之體死生之會不能變至人之神體不傷故日月無薄蝕之憂神不變故至人無死生之恐者矣有之非未無也無之非未有也且未無之有而不有未有之無而不無斯有無之至也故今有之忽無非昔無之未有今無之忽有非昔有之未無者異乎時也若夫無彼無有連既往之無有而不殊無此有無合將來有無而不異者同乎時也異乎時者代以為必然會有不然之者也同乎時者代以為不然會有必然之者也影之問乎光曰吾昧乎體之隂君昭乎質之陽君之初吾之餘君之中吾之窮君之沒吾之滅君之清吾之明何君之好無恆俾吾之令無常歟光之答乎影曰子在空而無在實而有在翼而飛在足而走在鈎而曲在弘而直子之近乎燭出子體之外子之遠乎鏡入吾質之內子之自無恆豈吾之獨無常歟雖然子之同抑吾之可通吾怪吾之尤者雖吾亦不知之何哉吾遇陽燧之抱倒乎子之面吾遭羅暇之蝕曲乎子之葉吾將問諸造化窮理盡性而不知者命也夫影笑之曰君弟收光吾將滅影有之與無由君之與吾何背何正妄推乎造化之命哉默之來也默曰一寂能一之默曰二寂能二之默之一也無寂之一也有默之二也無有寂之二也有無一之一也不離乎二二之二也不離乎一然則知寂之不一明默之不二者斯謂之真一矣夫真一者無一無二無寂無默無是四者又無其無斯謂之真無矣夫能遊乎真無之域者然後謁乎真一之容者焉夫遊乎真無之域謁乎真一之容者乃見乎諸無矣寂於是謂默曰若夫諸無者人莫能名焉吾強為之名者曰太無之寰夫太無之寰者人無能諡焉吾強為之諡者子能聽之乎曰能寂於是乎端容節氣湛然不曰久之而兩忘默之悟曰向也吾聞其名矣又見其無也今也吾聞其諡矣未見其無也斯之謂之太無之諡耶寂之覺曰適吾與子為微談而子果聞諸子可謂明微矣自默之還也而寂為之絶談玄真子外篇卷下
