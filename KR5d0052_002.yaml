front:
  text: 玄真子外篇卷中
  hash: sha256:21331b9e7b0af2f20ce24c135021f10df5ac9a798b5561335e382db02ab9c832
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0052_HFL_002-001a, image: hfl/0672/0672-136.png}
body:
  text: 唐玄真子張志和撰驚驚鸞鷺氏自東方來狻麑氏自西域至遇于中華之野相與競虛談以聲戰勝負於是鸑鷺氏嚶若而鳴曰吾聞吁者嘻者呵者噓者喟㕟苦壞切揚呼加切呬喘乎氣噬者啜者啐者啜者辛酸甜淡吮乎味睨者辨者眄者睢盱瓊呼玄切𥅯作晟呼聿切察乎曈夏者控者乾者擬者鏗鍠鼙力宗切鼛歡乎聰斯極已於是狻麑氏䞴竹交竹教二切然而唬呼交古伯二切曰吾聞日者月者彗者孛者昭晰粲朗斡乎天峯者嶺者岡者巖者嵯峨巉崒疊乎山濤者波者溢者渦者澎訇澶漫蕩乎水僑者魃者魑者魅者僁窣魍庚乎切槐欻乎鬼斯極己意曰酬酢相窮以言泉飛不斷自以為極然鸞鷲氏摩距萬吻以觜戲聞狻麑氏奮毛掉尾以喉鳴震中華子歎之曰近謂諸身則鸞鷺之説遠謂諸物則狻麑之説斯二君者背彼默場勞於聲戰雖扇眸若電鼓舌如霆適足驚鷙於窮谷安能響道於滄溟哉太寥問乎無邊曰若夫造化之間萬象不一求小大有無之至者可得而言乎無邊曰以吾之觀至小者大而至大者小至無者有而至有者無若知之乎太寥曰以吾聞之至小不可以大至大不可以小至無不可以有至有不可以無子之所謂者何也無邊曰吾請告若至小至大者莫甚乎空至無至有者莫過乎道其所然者何也包天地至有外者唯乎空非空之至大耶判微塵至無內者成乎空非空之至小邪巡六合求之而不得者非道之至無邪出造化離之而不免者非道之至有邪故曰至小者大至大者小至無者有至有者無不亦然乎造化之初九大相競風之飄颶于貴切然曰䬌䬌匹周切乎之飍飍香幽切乎而颼颼乎之颷颷乎而扇鴻濛而么揚力么切㕭於交切嘐古苞切鼓䜰呼勞切䜮力刀切而悲吒䬂呼出切颶呼交切蹶石拔木蹙浪奔濤其孰能大乎吾之大乎而雲之氣騰然曰翕乎忽乎之滅沒乎者縫扶龍切浡蒲忽切涸於鄰切煴之蓊鬱乎者蒙乎昧乎之昏晦乎者靉靆黭於甘於敢二切黮敕咸都甚二切之霮徒感切䨴徒對切乎者翳海吞山遏日漫天其孰能大乎吾之大乎者雷之聲墳然曰諜轟轟乎轢轢忽犖犖乎虩虩磤承謹切輪奔乎轂乎些欻電埏烈缺砉呼覓切霆驚劈歷乎些若獨不聞乎洪濤震鼓猛獸唬怒彼碌碌者莫吾之與巨其孰能大乎吾之大乎些海之濤奔然曰浩乎汗乎之壇漫乎且澎乎湃乎之滂沛乎且何鯤鵬頒鰓相來切臭翼之聲邪乎且翻鼇蕩鯨崩壺倒瀛其孰能大乎吾之大乎且火之熛烈然曰烘乎炵他冬切乎之煥爛乎焉翕乎煜乎之煽炫乎焉㶼烏來切灼爍烜嚇糅愈律切𤐰涸澤燋山熾日熏天其孰能大乎吾之大乎焉日之耀照然曰煌煌乎陽陽乎歟晶晶乎之熒熒乎歟杲杲曈曈炎炎赫赫光天照地流金鑠石其孰能大乎吾之大乎歟地之震殷然曰坤乎崙乎之坱圠磅礡之乎之崔乎嵬乎之坳墝確䃗音剝之乎之浸海流河而有常奔山走陵而無疆其孰能大乎吾之大乎之天之鳴宏胡萌切然曰乾乎圓乎之慤乎只穹乎崇乎廓乎只昊恢恢之顛顛旻蒼蒼之玄玄包水旋風蓋地寰空其孰能大乎吾之大乎只空之寥𣪯六宗切然曰豁乎沈乎之曠宕乎哉虛乎無乎之漭浪乎濛同茫唐青冥蒼茫廓兮而㝩苦郎切㝗力蕩切包天裹地誕隂育陽其孰能大乎吾之大乎哉既而九大各自競能風之擊曰孰有大乎吾曹之大矣空應之曰吾聞太上之言道名之大可詣而問焉於是雲停其氣風息其飄日罷其耀海弭其濤地復其震火滅其熛天靜其鳴空喪其寥於是乎俾雷之迸入道之境聲者讓響形者讓影不有不無不動不靜九大觀之各慙而還遂相讓為無為之色相與成無為之域以終乎塵劫之極而己焉乎欹道之形也虛道之影也無道之聲也初道之響也如昔之為狀乎廓然其虛者空也莫然其無者滅也永然其初者遠也靜然其如者定也字之曰遺遐明默慤博玄圓者何也遺以盡其失遐以邈其遙明以照其光默以湛其寂慤以堅其固博以大其廣玄以神其妙圓以規其周故曰德者得也得乎不得不得乎得斯之謂乎得其德者何也文宣德之而無我老氏德之而未孩南華德之獨與天地精神往來而不敖睨於萬物噫沖虛德之泠然御風顔回德之同於大通然則大寥德之無終始己矣夫延吾思之不能竟也將何以窮有物之既乎耀夜者燭腹也橐體者篋軀也戴芥者負垢也苗蜩者根蟬也晴星者眩華也燭腹之蟲循乎墻篋軀之蟲出乎隙負垢之蟲遊乎業根蟬之蟲植乎土篋軀哂乎燭腹曰子之自謂飬生之固者也燭乎腹耀乎夜見乎險阻審乎取捨然而世人相有炫明之患怪乎物亡乎身未若吾之晦迹之道遙也負垢哂乎篋軀曰子之自謂飬生之固者也橐乎體篋乎軀進則外乎首而行恐則內乎元而靜然而出入有首鼠之患怪乎物亡乎身未若吾之蓋形之道遙也根蟬哂乎負垢曰子之自謂養生之固者也蓁然芥孽然垢徐然步物之不疑子之動也糞然形物之不疑子之生也然而慮風火有驚恐之患未若吾之瘞體之道逼也之數蟲者各以能之相哂也於是眩華聞之哂乎根蟬曰子之自謂養生之固者也藏乎口匿乎目虛乎心實乎腹根乎足潤水土於外而不行苗乎脊受風日於外而屢長無羈鸝鵲之嫌者矣然而纍乎質礙乎有荀遇掘鑿之患怪乎物亡乎身未若吾之瞥然之道逼也根蟬曰吾稟乎造化之奇妙乎古今之知藏口匿目虛心實腹之數蟲者其於衛生莫吾如也向吾聞子之聲昧子之形狀子之有自何而生眩華曰吾生乎目之眩長乎視之亂其徐也聯若星之貫其疾也紛若華之散取之而不得捨之而不克謂無而有謂有而無其來也倏見乎造化其去也寂歸乎太虛能遊乎不物之域者方覩乎吾之逍遙之墟域同乎于圓也方也于方也圓也故曰至圓無圓而能方至方無方而能圓孰能圓乎方者曰太圓孰能方乎圓者曰太方故太方有言曰昔吾方子之圓而子弗知吾之方太圓曰曩吾圓爾之方而爾不知吾之圓苦然者何也其有以哉是故規乎虛者虛之不知其圓也矩乎空者空之不知其方也然則遊心乎太寂之鄉命規矩無措其巧者其唯太圓之與太方乎倭之人談曰東海有鳥其名為鵜鵜之巨鵬之亞也泛乎滄溟吞乎長鯨厭而翶翔乎碧空之畔防風㚠火么切者弋伯者也為大弓萬物鉤望巨鵜之飛於是乎彀以射焉一發而中鵜之吒怒聲越雷霆俄而驟血成河落毛翳日翻墜之勢韻乎空濛之間墮於曠漭之野𣪯然震乎大地太虛為之響造化為之凶防風㚠環趨觀之旬日而畢然後陟巨鵜之上旁觀四海嵐蔽乎大地於是率天下之庖徒雲梯而解之四方之烹者蒸氣成雲山木為之竭脯之費七年而中華不臘肪之用九年而異域不膏帆其羽以為舟者散乎大海命之曰鵜毛之舶防風㚠神其弓之力也每齋沐而祭焉天下之博聞志怪者莫不命駕而觀之弧矢之盛造化以來未之有者於是乎在也玄真子外篇卷中
