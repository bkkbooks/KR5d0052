front:
  text: 玄眞子外篇卷中
  hash: sha256:2f6dfc21edd0ffb1b9931cfb8fb962adc402fbad9501af556740195a8264a5c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0052_HFL_002-001a, image: hfl/0672/0672-136.png}
body:
  text: 唐玄眞子張志和撰驚驚鸞鷺氏自東方來狻麑氏自西域至遇于中華之野相與競虚談以聲戰勝負於是鸑鷺氏嚶若而鳴曰吾聞吁者嘻者呵者噓者喟㕟苦壊切颺呼加切呬喘乎氣噬者啜者啐者歠者辛酸甜淡吮乎味睨者辯者眄者睢盱瓊呼玄切𥅯作晟呼聿切察乎曈夏者控者乾者擬者鏗鍠鼙力宗切鼛讙乎聦斯極已於是狻麑氏䞴竹交竹教二切然而唬呼交古伯二切曰吾聞日者月者彗者孛者昭晰粲朗斡乎天峯者岭者崗者巖者嵯峨巉崒疊乎山濤者波者溢者渦者澎訇澶漫蕩乎水僑者魃者魑者魅者僁窣魍庚乎切槐欻乎鬼斯極己意曰酬酢相窮以言泉飛不斷自以爲極然鸞鷲氏摩距萬吻以觜戲聞狻麑氏奮毛掉尾以喉鳴震中華子歎之曰近謂諸身則鸞鷺之說遠謂諸物則狻麑之說斯二君者背彼默場勞於聲戰雖扇眸若電鼓舌如霆適足驚鷙於窮谷安能響道於滄溟哉太寥問乎无邊曰若夫造化之間萬象不一求小大有无之至者可得而言乎无邊曰以吾之觀至小者大而至大者小至无者有而至有者无若知之乎太寥曰以吾聞之至小不可以大至大不可以小至无不可以有至有不可以无子之所謂者何也无邊曰吾請告若至小至大者莫甚乎空至无至有者莫過乎道其所然者何也包天地至有外者唯乎空非空之至大耶判微塵至无内者成乎空非空之至小邪巡六合求之而不得者非道之至无邪出造化離之而不免者非道之至有邪故曰至小者大至大者小至无者有至有者无不亦然乎造化之初九大相競風之飄颶于貴切然曰䬌䬌匹周切乎之飍飍香幽切乎而颼颼乎之颷颷乎而扇鴻濛而么颺力么切㕭於交切嘐古苞切鼓䜰呼勞切䜮力刀切而悲咤䬂呼出切颶呼交切蹶石拔木蹙浪奔濤其孰能大乎吾之大乎而雲之氣騰然曰翕乎忽乎之滅没乎者縫扶龍切浡蒲忽切涸於鄰切煴之蓊鬱乎者蒙乎昧乎之昏晦乎者靉靆黭於甘於敢二切黮敕咸都甚二切之䨢徒感切䨴徒對切乎者翳海吞山遏日漫天其孰能大乎吾之大乎者雷之聲墳然曰諜轟轟乎轢轢忽犖犖乎虩虩磤承謹切輪奔乎轂乎些欻電埏烈缺砉呼覓切霆驚劈歷乎些若獨不聞乎洪濤震鼓猛獸唬怒彼碌碌者莫吾之與巨其孰能大乎吾之大乎些海之濤奔然曰浩乎汗乎之壇漫乎且澎乎湃乎之滂沛乎且何鯤鵬頒鰓相來切臭翼之聲邪乎且翻鼇盪鯨崩壺倒瀛其孰能大乎吾之大乎且火之熛烈然曰烘乎炵他冬切乎之煥爛乎焉翕乎煜乎之煽炫乎焉㶼烏來切灼爍烜嚇糅愈律切𤐰涸澤燋山熾日熏天其孰能大乎吾之大乎焉日之燿照然曰煌煌乎陽陽乎歟晶晶乎之熒熒乎歟杲杲曈曈炎炎赫赫光天照地流金鑠石其孰能大乎吾之大乎歟地之震殷然曰坤乎崙乎之坱圠磅礡之乎之崔乎嵬乎之坳墝确䃗音剥之乎之浸海流河而有常奔山走陵而无疆其孰能大乎吾之大乎之天之鳴𥥈胡萌切然曰乾乎圓乎之慤乎只穹乎崇乎廓乎只昊恢恢之顛顛旻蒼蒼之玄玄包水旋風蓋地寰空其孰能大乎吾之大乎只空之寥𣪯六宗切然曰豁乎沈乎之曠宕乎哉虚乎无乎之漭浪乎濛同茫唐青冥蒼茫廓兮而㝩苦郞切㝗力蕩切包天裹地誕隂育陽其孰能大乎吾之大乎哉既而九大各自競能風之擊曰孰有大乎吾曹之大矣空應之曰吾聞太上之言道名之大可詣而問焉於是雲停其氣風息其飄日罷其燿海弭其濤地復其震火滅其熛天靜其鳴空喪其寥於是乎俾雷之迸入道之境聲者讓響形者讓影不有不无不動不靜九大觀之各慙而還遂相讓爲无爲之色相與成无爲之域以終乎塵劫之極而己焉乎欹道之形也虚道之影也无道之聲也初道之響也如昔之爲狀乎廓然其虛者空也莫然其无者滅也永然其初者遠也靜然其如者定也字之曰遺遐明黙慤博玄圓者何也遺以盡其失遐以邈其遥明以照其光默以湛其寂慤以堅其固博以大其廣玄以神其妙圓以規其周故曰德者得也得乎不得不得乎得斯之謂乎得其德者何也文宣德之而无我老氏德之而未孩南華德之獨與天地精神往來而不敖睨於萬物噫沖虚德之泠然御風顔回德之同於大通然則大寥德之无終始己矣夫延吾思之不能竟也將何以窮有物之既乎燿夜者燭腹也橐體者篋軀也戴芥者負垢也苗蜩者根蟬也晴星者眩華也燭腹之蟲循乎墻篋軀之蟲出乎隙負垢之蟲游乎業根蟬之蟲植乎土篋軀哂乎燭腹曰子之自謂飬生之固者也燭乎腹燿乎夜見乎險阻審乎取捨然而世人相有炫明之患怪乎物亡乎身未若吾之晦迹之道遥也負垢哂乎篋軀曰子之自謂飬生之固者也橐乎體篋乎軀進則外乎首而行恐則内乎元而靜然而出入有首鼠之患怪乎物亡乎身未若吾之蓋形之道遥也根蟬哂乎負垢曰子之自謂養生之固者也蓁然芥孽然垢徐然步物之不疑子之動也糞然形物之不疑子之生也然而慮風火有驚恐之患未若吾之瘞體之道逼也之數蟲者各以能之相哂也於是眩華聞之哂乎根蟬曰子之自謂養生之固者也藏乎口匿乎目虛乎心實乎腹根乎足潤水土於外而不行苗乎脊受風日於外而屢長无羈鸝䧿之嫌者矣然而累乎質礙乎有荀遇掘鑿之患怪乎物亡乎身未若吾之瞥然之道逼也根蟬曰吾禀乎造化之奇妙乎古今之知藏口匿目虚心實腹之數蟲者其於衛生莫吾如也向吾聞子之聲昧子之形狀子之有自何而生眩華曰吾生乎目之眩長乎視之亂其徐也聯若星之貫其疾也紛若華之散取之而不得捨之而不克謂无而有謂有而无其來也儵見乎造化其去也寂歸乎太虛能游乎不物之域者方覩乎吾之逍遥之墟域同乎于圓也方也于方也圓也故曰至圓无圓而能方至方无方而能圓孰能圓乎方者曰太圓孰能方乎圓者曰太方故太方有言曰昔吾方子之圓而子弗知吾之方太圓曰曩吾圓爾之方而爾不知吾之圓苦然者何也其有以哉是故規乎虚者虛之不知其圓也矩乎空者空之不知其方也然則游心乎太寂之鄉命規矩无措其巧者其唯太圓之與太方乎倭之人談曰東海有鳥其名爲鵜鵜之巨鵬之亞也泛乎滄溟吞乎長鯨厭而翶翔乎碧空之畔防風㚠火么切者弋伯者也爲大弓萬物鉤望巨鵜之飛於是乎彀以射焉一發而中鵜之咤怒聲越雷霆俄而驟血成河落毛翳日翻墜之勢韻乎空濛之間墮於曠漭之野𣪯然震乎大地太虚爲之響造化爲之兇防風㚠環趨觀之旬日而畢然後陟巨鵜之上旁觀四海嵐蔽乎大地於是率天下之庖徒雲梯而解之四方之烹者蒸氣成雲山木爲之竭脯之費七年而中華不腊肪之用九年而異域不膏帆其羽以爲舟者散乎大海命之曰鵜毛之舶防風㚠神其弓之力也每齋沐而祭焉天下之博聞志怪者莫不命駕而觀之弧矢之盛造化以來未之有者於是乎在也玄眞子外篇卷中
