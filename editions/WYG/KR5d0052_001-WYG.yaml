body:
  text: 𤣥眞子唐張志和撰碧虛碧虛㝠茫飄輪斡乎乾湫盤浮乎坤紅明環於天衢升井為炎降斗為寒由是四時旋而萬物遷斯造化之亞矣然非造化之元哉無涯者辯伯也涯之言曰黄郊之帝曰祗卑紫㣲之帝曰神尊碧虚之帝曰靈祗卑王於地山河草木屬焉神尊王於天日月星漢屬焉靈王於空風雷雲雨屬焉碧虛和平二帝有方春之㑹俄而祗卑上騰神尊下降遇於靈之野靈之帝虛位郊迎傾國所有積肉成霞㪚酒成雨電走雷奔風歌雲舞累月為中道主上下無怨二帝欣然愧靈之厚德令碧虛之不安爭讓國以延靈之帝神尊曰朕有天祗卑曰朕有地靈恠天地之名問之曰朕之仰觀不異碧虛朕之俛察不異碧虛碧虛之外又奚物帝言天地厥狀若何祗卑曰朕之地體大質厚資生元元中高外垂其勢坤層然如壇輳物尊圍八極海環九山骨巖石毛草木肉土而脉泉汗露而氣烟江河川凟亂奔流人蟲鳥獸紛往還願帝之下而遊焉神尊曰朕之天體虚形高資始化化中員外轉其行乾穹然如帳幬物尊五星交列宿粲邊層輪日月中又帶河漢絶雰祲雲霞列仙天宫殿願帝之上而居焉靈未之信曰天如帳胡縣乎其上地如壇厥下乎何安神尊曰天之帳非上縣飄輪下載常左旋三光隨之以西遷祗卑曰地之壇有湫盤凝浮其上所以安靈曰飄輪斡靈生湫盤奚物盛願聞之祗卑曰飄輪徧乎下湫盤所以停帝何疑靈曰噫天地之形造化信然實如所論固當息焉朕之空茫唐濛同無不通無内無外無西無東曠閬漭蕩蒼茫清㝠含日月之光震雷霆之聲挂虹蜺之色飛龍鸞之形朕坐而游之卧而泅之泛然飄颻皆可停豁乎包乎母廓乎堅乎壽非春夏之能生非歲年之能朽先天地不見其初後天地不知其久若然者安能棄朕之長無寄君之暫有哉於是二帝謝靈之言退還故府祗卑降黄郊神尊升紫㣲數月不泰然天地為之閉紅霞子問乎碧虚子曰夫造化之端自然之元其體若何霄願游夫子之域而觀之豈得聞邪於是碧虛子泬然有間豁然晴容而曉顔詠乎太寥之上為空洞之歌謂之曰無自而然自然之元無造而化造化之端廓然慤然其形團闔爾之視絶爾之思可以觀紅霞子曰若霄者儵遨而忽游請駕乎言霄願乗之以逍遥不暇辭夫子而觀焉於是碧虚子導之曰無自而然是謂𤣥然無造而化是謂眞化之𤣥也之眞也無𤣥而𤣥是謂眞𤣥無眞而眞是謂𤣥眞馳言曰無然乎其然一乎然然後觀乎自然無化乎其化一乎化然後觀乎造化無𤣥乎其𤣥一乎𤣥然後觀乎眞𤣥無眞乎其眞一乎眞然後觀𤣥眞逸言曰眞眞乎𤣥𤣥𤣥乎眞𤣥乎無眞乎眞眞眞乎無𤣥乎𤣥𤣥然後登太寥之天夫無有也者有無之始也有無也者無有之初也無有作有無立而造化行乎其中矣夫造化之興也空以徧之風以行之水以聚之識以感之氣以通之而萬物備乎其中矣空徧而體存風行而用作水聚而有見識感而念生氣通而意立體存故可以厚本用作故可以明漸有見故可以觀變念生故可以知化意立故可以詳理是知本可厚者空之體也漸可明者風之用也變可觀者水之有也化可知者識之念也理可詳者氣之意也是故風水競變物其物而不同識氣多端意其意而不一斡乎乾而能常浮乎坤而能長運之而無窮生之而無方化之而無邊因之而無疆原其原者夫何謂歟造而化之存乎初太而極之存乎無自而然之存乎虚無而住之存乎妙觀其所存而造化之元可見矣紅霞子明乎造化之域患乎屢空之色於是披紅陽之光餐碧寥之氣以實其容絶慶弔之禮寡親朋之問獨與太虚游往來高㑹僕風應門燭月繼夜而寂談不輟味俗享貴者聞之造焉覩其空巷廬色不勝憂心為之耻謂之曰我躬不閲遑恤造化紅霞子曰吾為造化知已罔有弗詳而造化獨不吾知致有所乏吾無慙於造化造化有愧於吾吾將往而詬之以慰君之憂澣君之耻於是駕紅陽之駒乗碧寥之輿拂衣東轅經諸無之國遇同空將假道焉同空曰君何為者而届乎斯曰吾紅霞子也吾將詬諸造化願假道於君同空問之曰孰為造化奚謂假道紅霞子曰為物之宰主曰造化藉君之國行曰假道同空曰若然者朕之東無化可造朕之國無道可假君其改途紅霞子於是乎拂衣南馳經自然之域遇化元將假道焉化元曰子何為者而届乎斯曰吾紅霞子也吾將詬諸造化願假道於君化元詰之曰夫造化朕之兄弟之國也子弗聞乎假朕之道詬朕之親朕之仇也師徒將攻之紅霞子於是乎拂衣西驅經無住之邦遇因本將假道焉因本曰子何為者而届乎斯曰吾紅霞子也吾將詬諸造化願假道於君因本拒之曰假道之資子弗聞乎子有飛空之乗輿照虚之璧吾將為子啟關紅霞子曰使吾有璧乗之資尚弗詬諸造化無假道於君哉於是乎拂衣而北趨經太極之野遇生首將假道焉生首曰子何為者而届乎斯曰吾紅霞子也吾將詬諸造化願假道於君生首訶之曰子何知之晚也夫造化之夐可知而不可鄰可聞而不可親雖欲假子之道其何以至子將詬之無乃不可乎於是紅霞子聞生首之訶兀焉䘮有徘徊躊躇還轡旋輿經𤣥原之郊迷失途於牧道童子神與易浴乎𤣥川而遨於是問津焉二童曰夫子奚氏也跋渉虚無蒙犯烟霄車馬有游空之倦何之而問乎津紅霞子曰吾紅霞子也吾嘗知造化而造化弗吾知使吾乏資身之用為味俗之耻吾將詬諸造化吾適東轅西驅南馳北趨而假道於四方東至於諸無南至於自然西至於無住北至於太極四之皆不遇諸無有同空之問無住有因本之拒太極有生首之訶自然有化元之詰吾念日暮途逺旋吾之輿歸乎寰中於斯迷津幸哉而遇子敢欲問焉然子為誰也偉哉而文於言哉二童曰吾謂神之與易也吾與造化牧道於𤣥郊吾適為六塞之戲俱亡其道吾懼造化之責躊躇而遷延因浴乎𤣥原且吾之有道憂尚敢見造化奈何夫子以俗耻而干吾君賴夫子有諸侯之詰無然一忤造化之念兹𤣥原之上豈可復觀吾二童之泅游哉夫子辭寰中而來未覩造化茫然迷津而問途欲迷舊居將何面目以見寰中之父兄乎胡弗解裳浴焉同泅隨波泛濤聊以游遨俟吾白圖之成將近夫子而謁諸造化不亦爾豁乎紅霞子於是赩然浮光沉影泝瀬㳂波與二童乗𤣥濤之騰澹泛六合之外儵忽至造化之境自然奉常然衣太極進無極食煥然盈造化之域紅霞子與二童披而餐之榮光洞六合之内然後謁乎化眞顧而俛於寰中慙代俗之榮耻皆妄觀乎化眞唯懼造化之知其將詬也於是聽造化問二童道之所在二童曰無亡無不亡道不離乎皇之鄉造化欣然曰無有其有者無亡其亡無不有其不有者無不亡其不亡放乎𤣥原之郊而無邊童子得牧道之方矣於是紅霞子盈自然衣充太極食樂造化言荷造化力揖造化與二童眷然而退將還舊居是行也與太虚遇於同空太虚曰自子之觀造化也索焉離居蕭然廬念子寰中無恙紅霞子曰吾適也面造化容意造化心耳造化言吾知至道之無有也吾豈見寰中之有無哉化之元也原乎有者觀其無原乎無者觀其有奚以狀其然邪容之為言也㝠其靈乎也精茫其唐乎也故曰㝠靈精之難明茫唐之難詳殊萬形之無窮異萬心之無方是以昔之登太寥觀化元者知其運乎工而未央作太寥之歌曰化元靈哉碧虚清哉紅霞明哉㝠哉茫哉惟化之工無疆哉非夫同萬形之殊殊萬形之同一萬心之異異萬心之一馳不想而届乎㝠茫之端倪者則何以環游太無觀造化之無矣鸑鷟鸑鷟氏自東方來狻麑氏自西域至遇於中華之野相與競虛談以聲戰勝負於是鸑鷟氏嚶若而鳴曰吾聞吁者嘻者呵者嘘者喟颬呬喘乎氣噬者啜者啐者歠者辛酸甜淡吮乎味睨者辯者眄者睢盱矎察乎瞳戞者控者乾者者鏗鍠䥢鼕讙乎聦斯極已於是狻麑氏䞴然而唬曰吾聞日者月者彗者孛者昭晰粲朗斡乎天峯者岑者岡者巖者嵯峨巉崒疊乎山濤者波者湓者渦者澎訇澶漫蕩乎水僪者者魑者魅者僁䰧欻乎鬼斯極已意曰酬酢相窮以言泉飛不斷自以為極然鸑鷟氏摩距厲吻以觜戯聞狻麑氏奮毛掉尾以喉鳴震中華子歎之曰近謂諸身則鸑鷟之説逺謂諸物則狻麑之説斯二君者背彼黙場勞於聲戰雖扇眸若電鼓舌如霆適足驚鷙於窮谷安能響道於滄溟哉太寥問乎無邊曰若夫造化之間萬象不一求小大有無之至者可得而言乎無邊曰以吾之觀至小者大而至大者小至無者有而至有者無若知之乎太寥曰以吾聞之至小不可以大至大不可以小至無不可以有至有不可以無子之所謂者何也無邊曰吾請告若至小至大者莫甚乎空至無至有者莫過乎道其所然者何也包天地至有外者唯乎空非空之至大耶判㣲塵至於内者成乎空非空之至小耶廵六合求之而不得者非道之至無邪出造化離之而不免者非道之至有邪故曰至小者大至大者小至無者有至有者無不亦然乎造化之初九大相競風之飄䬑然曰䬌䬌乎之飍飍乎而䬒䬒乎之飂飂乎而扇鴻濛而么飉㕭嘐皷䜰䜮而悲咤䬄䬘蹶石拔木蹙浪奔濤其孰能大乎吾之大乎而雲之氣騰然曰翕乎忽乎之㓕没乎者漨浡洇煴之蓊鬱乎者蒙乎昧乎之昏晦乎者靉靆黭黮之䨢䨴乎者翳海吞山遏日漫天其孰能大乎吾之大乎者雷之聲填然曰諜轟轟乎轢轢忽犖犖乎虩虩磤輪奔乎轂乎些欻電烻烈缺砉霆驚劈歴乎些若獨不聞乎洪濤震鼓猛獸唬怒彼碌碌者莫吾之與巨其孰能大乎吾之大乎些海之濤奔然曰浩乎汗乎之澶漫乎且澎乎湃乎之滂沛乎且何鯤鵬頒鰓臭翼之聲邪乎且翻鼇盪鯨崩壺倒瀛其孰能大乎吾之大乎且火之熛烈然曰烘乎炵乎之煥爛乎焉翕乎煜乎之煽炫乎焉㽎㶼灼爍烜爀燏涸澤燋山熾日熏天其孰能大乎吾之大乎焉日之燿照然曰煌煌乎陽陽乎歟晶晶乎之熒熒乎歟杲杲曈曈炎炎赫赫光天照地流金鑠石其孰能大乎吾之大乎歟地之震殷然曰坤乎崙乎之坱圠磅礴之乎之崔乎嵬乎之坳墝磽䃗之乎之浸海流河而有常奔山走陵而無疆其孰能大乎吾之大乎之天之鳴宖然曰乾乎圓乎之慤乎只穹乎崇乎廓乎只昊恢恢之顚顚旻蒼蒼之𤣥𤣥包水旋風盖地寰空其孰能大乎吾之大乎只空之寥然曰豁乎泬乎之曠宕乎哉虚乎無乎之漭浪乎哉濛同茫唐青㝠蒼茫廓兮而㝩㝗包天裹地誕隂肓陽其孰能大乎吾之大乎哉既而九大各自競能風之撃曰孰有大乎吾曹之大矣空應之曰吾聞太上之言道名之大可詣而問焉於是雲停其氣風息其飄日罷其燿海弭其濤地復其震火滅其熛天靜其鳴空喪其寥於是乎俾雷之迸入道之境聲者讓響形者讓影不有不無不動不靜九大觀之各慙而還遂相讓為無為之色相與成無為之域以終乎塵劫之極而已焉乎欹道之形也虚道之影也無道之聲也初道之響也如昔之為狀乎廓然其虚者空也莫然其無者滅也永然其初者逺也靜然其如者定也字之曰遺遐明黙慤博𤣥圓者何也遺以盡其失遐以邈其遥明以照其光黙以湛其寂慤以堅其固博以大其廣𤣥以神其妙圓以規其周故曰德者得也得乎不得不得乎得斯之謂乎得其德者何也文宣德之而無我老氏德之而未孩南華德之獨與天地精神往來而不敖睨於萬物噫冲虚德之泠然御風顔囘德之同於大通然則太寥德之無終始已矣夫延吾思之不能竟也將何以窮有物之既乎燿夜者燭腹也橐體者篋軀也戴芥者負垢也苗蜩者根蟬也睛星者眩華也燭腹之蟲循乎墻篋軀之蟲出乎隙負垢之蟲游乎葉根蟬之蟲植乎土篋軀哂乎燭腹曰子之自謂養生之固者也燭乎腹燿乎夜見乎險阻審乎取捨然而世人相有炫明之患恠乎物亡乎身未若吾之晦迹之逍遥也負垢哂乎篋軀曰子之自謂養生之固者也槖乎體篋乎軀進則外乎首而行恐則内乎元而静然而出入有首䑕之患恠乎物亡乎身未若吾之盖形之逍遥也根蟬哂乎負垢曰子之自謂養生之固者也蓁然芥孽然垢徐然歩物之不疑子之動也糞然形物之不疑子之生也然而慮風火有驚恐之患未若吾之瘞體之逍遥也之數蟲者各以能之相哂也於是眩華聞之哂乎根蟬曰子之自謂養生之固者也藏乎口匿乎目虚乎心實乎腹根乎足潤水土於外而不行苗乎脊受風日於外而屢長無覇䧿之嫌者矣然而累乎質礙乎有茍遇掘鑿之患恠乎物亡乎身未若吾之瞥然之逍遥也根蟬曰吾稟乎造化之竒妙乎古今之知藏口匿目虚心實腹之數蟲者其於衞生莫吾如也向吾聞子之聲昧子之形狀子之有自何而生眩華曰吾生乎目之眩長乎視之亂其徐也聯若星之貫其疾也紛若華之㪚取之而不得捨之而不克謂無而有謂有而無其來也儵見乎造化其去也寂歸乎太虚能游乎不物之域者方覩乎吾之逍遥之墟域同乎於圓也方也於方也圓也故曰至圓無圓而能方至方無方而能圓孰能圓乎方者曰太圓孰能方乎圓者曰太方故太方有言曰昔吾方子之圓而子弗知吾之方太圓曰曩吾圓爾之方而爾不知吾之圓若然者何也其有以哉是故規乎虚者虚之不知其圓也矩乎空者空之不知其方也然則游心乎太寂之鄉令規矩無措其巧者其唯太圓之與太方乎倭之人談曰東海有鳥其名為鵜鵜之巨鵬之亞也泛乎滄溟呑乎長鯨厭而翺翔乎碧空之畊防風㚠者弋伯者也為大弓萬物鉤望巨鵜之飛於是乎彀以射焉一發而中鵜之咤怒聲越雷霆俄而驟血成河落毛翳日翻墜之勢隕乎空濛之間墮於曠漭之野然震乎大地太虚為之響造化為之兇防風㚠環趨觀之旬日而畢然後陟巨鵜之上旁觀四海嵐蔽乎大地於是率天下之庖徒雲梯而解之四方之烹者蒸氣成雲山木為之竭脯之費七年而中華不腊肪之用九年而異域不膏帆其羽以為舟者㪚乎大海命之曰鵜毛之舶防風㚠神其弓之力也每齋沭而祭焉天下之博聞志恠者莫不命駕而觀之弧矢之盛造化以來未之有者於是乎在也濤之靈濤之靈曰江胥漢之神曰河姑㑹於眞原之野江之胥問乎河之姑曰吾以子為水也縣而不散夜而能煥異乎川者何也河之姑曰代謂吾之神以至於此吾亦何知焉若不聞乎泛天舩㵼天江俾牽牛織女之相望此吾之所能也敢問乎若吾以若為流也却而罷進行而有信似乎識者何也江之胥曰代謂吾之靈以至於此吾亦何知焉子不聞乎疾雷之奔羣鷺之翔素車白馬兮三軍之騰装此吾之所能也於是胥姑欣然相視而笑自謂靈神之至傲若無他道之㣲曰至𤣥在乎眞原之野聞而謂之曰若為胥姑哉今吾語若見天地之創遂觀濤漢之有且若之徒假名乎巫咸之口投首乎春秋之代不亦近歟夫迷者自釋濤漢之疑假若胥姑之有奈何受迷徒之咨而不覺竊造化之巧以為功不慙迷者之鬼笑若於黄泉之間歟胥姑悚然謝而問之曰吾以君為友也寂而不動虚而能應訐吾之妄俾吾之慙君亦有夫心哉吾聞道之㣲先天地生在眞原之野號曰至𤣥得非君子乎孰為君之名哉吾請辯吾靈神之所因原夫濤漢之所以可得聞乎至𤣥謂曰吾將告若欲知漢之説者觀乎碧之理有潔白之文寥乎螢之腹有昏曉之變體之異也豈有姑之神邪雖天漢之大非川可知矣若欲知濤之説者觀乎脉之血有往來之勢察乎槐之葉有開合之期氣之應也豈有胥之靈邪雖海濤之盛非識可見矣若欲知吾之説者空之無形而不動谷之無情而能應虚之至也豈有㣲之邪雖吾道之妙無心可知矣吾且告若崑崙之墟有智蟲焉贅聞而疣見託吾之無憑若之有强目河姑之神假意江胥之靈妄首至𤣥之㣲偽之興也於是乎起吾觀之太寰之内似神而無者六海波泝江而為濤天文皎夜而為漢炎光閃雲而為電雨色映日而為虹陽氣轉空而為雷心智㓕境而為道其所然者皆有由也非若之靈無吾之𤣥然吾之無也不無在若之有乎何有於是胥姑駢舞而謝曰實如所論有慙故友願陪無心之游聊以卒歲生為智蟲之所誣死則𦵏眞原之野安能復區區託靈濤漢使迷者之鬼笑吾儕於黄泉之間哉是夏也通眞之伯㑹起觀之君坐忘之后于睽修𤣥好也中談而二侯競道之有無連關解並竟日不决觀之君曰吾起於觀亭之間知道不無而見有忘之后曰吾坐於忘臺之上見道不有而知無通眞之伯謂之曰至道非有有無之殊君不見三光之見夭邪在高下而不同日月之體有大小諸星之位有廣狹若以逺近論小大稽夫日也失之於炎凉若以炎凉而語逺近稽夫日也失之於小大乃知無逺近之異旁視仰觀人目自爾夫以百尺之竿戴乎盤卧之立之逺近適等而小大不同信目之有夷險矣在乎東西不熾者諒衺照而不正自此地之隂氣得昇耳然則至道之見乎心也亦猶是哉在忘觀而不一或以為有或以為無以道為有使觀君處忘臺而見無以道為無使忘后游觀亭而知有斯乃忘觀之心自爾有無之體不殊由意之懐執滯者也然則競三光之逺近者不曉乎夷險之㣲競至道之有無者未通乎執滯之礙矣於是二君聞之銛舌而退逹𤣥夫子曰睽之㑹一三光之逺近合至道之有無剖古今不明之癖削談論不决之贅使觀君節並而忘后弭關者眞伯之力也吳生者善圖鬼之術粉壁墨筆風馳電走或先其足或見其手既㑹其身果應其口若合自然似見造化負以國名行年六十天下之圖工迹其妙而不能盡𤣥眞子聞而造焉曰敢問圖鬼之方有術何其道之不竭也吳生喜而言曰子非圖工之徒歟奚其問之深也於是筆酣之間揖𤣥眞子巵而酒之酒酣之間揖𤣥眞子甌而茶之茶酣之間屏諸弟子揖𤣥眞子宿而話之告以圖鬼之方曰吾何術哉吾有道耳吾嘗茶酣之間中夜不寢澄神湛慮喪萬物之有忘一念之懐久之寂然豁然儵然恢然匪素匪畫詭恠䰧千巧萬拙一生一滅來不可閼貎不可竭吾以其道之妙其方之要每以圖鬼為事未嘗告術於人是以行年六十負於國名天下以吾為圖鬼之祖自吾作古圖工如林願吾之覩聲吾響而不終形吾影而不窮響吾巧而竭力影吾道而莫測感子有造化之問吾不能無造化之對以吾不傳於人請子告於代𤣥眞子謝之曰㳂境者易泝像者難幸聞圖鬼之道吾見造化之端吾固不代之告君無謂吾之傳荷水為珠其圓也非規而不可方者離乎著也燼火為輪其常也非環而不可斷者疾乎連也背日噴乎水成虹蜺之狀而不可直者齊乎影也汲江釀乎酒應波濤之湧而不可停者均乎氣也片雨滴海合滄溟而不可殊者得其一也寂心歸空同太虚而不可分者㑹其天也日月有合璧之元死生有循環之端定合璧之元者知薄蝕之交有時逹循環之端者知死生之㑹有期是故月之掩日而光昏月度而日耀日之對月而明奪違對而月朗是故死之換生而魂化死過而生來生之忘死而識空失忘而死見然則月之明由日之照者也死之見由生之知者也非照而月之不明矣非知而死之不見矣且薄蝕之交不能傷日月之體死生之㑹不能變至人之神體不傷故日月無薄蝕之憂神不變故至人無死生之恐者矣有之非未無也無之非未有也且未無之有而不有未有之無而不無斯有無之至也故今有之忽無非昔無之未有今無之忽有非昔有之未無者異乎時也若夫無彼無有連既往之無有而不殊無此有無合將來有無而不異者同乎時也異乎時者代以為必然㑹有不然之者也同乎時者代以為不然㑹有必然之者也影之問乎光曰吾昧乎體之隂君昭乎質之陽君之初吾之餘君之中吾之窮君之没吾之滅君之清吾之明何君之好無恒俾吾之令無常歟光之答乎影曰子在空而無在實而有在翼而飛在足而走在鈎而曲在弦而直子之近乎燭出子體之外子之逺乎鏡入吾質之内子之自無恒豈吾之獨無常歟雖然子之同抑吾之可通吾恠吾之尤者雖吾亦不知之何哉吾遇陽燧之抱倒乎子之面吾遭羅㬋之蝕曲乎子之葉吾將問諸造化窮理盡性而不知者命也夫影笑之曰君第收光吾將滅影有之與無由君之與吾何背何正妄推乎造化之命哉黙之來也黙曰一寂能一之黙曰二寂能二之黙之一也無寂之一也有黙之二也無有寂之二也有無一之一也不離乎二二之二也不離乎一然則知寂之不一明黙之不二者斯謂之眞一矣夫眞一者無一無二無寂無黙無是四者又無其無斯謂之眞無矣夫能游乎眞無之域者然後謁乎眞一之容者焉夫游乎眞無之域謁乎眞一之容者乃見乎諸無矣寂於是謂黙曰若夫諸無者人莫能名焉吾强為之名者曰太無之寰夫太無之寰者人無能諡焉吾强為之諡者子能聽之乎曰能寂於是乎端容節氣湛然不曰久之而兩忘黙之悟曰向也吾聞其名矣又見其無也今也吾聞其諡矣未見其無也斯之謂之大無之諡耶寂之覺曰適吾與子為㣲談而子果聞諸子可謂明㣲矣自黙之還也而寂為之絶談𤣥眞子
